name: 04 - Uso de Actions
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Node setup"
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'  

      - name: "Install dependencies"
        working-directory: ./my-app
        run: |
          npm install && npm ci

      - name: "Run tests"
        working-directory: ./my-app
        run: |
          npm test
