name: 16 - 2 - Reusable Workflows - Reusable Usage
on:
  workflow_dispatch:
jobs:
  deploy:
    uses: ghaBabel202603/202603-githubactions-a-esmoris/.github/workflows/16-1-reusable-workflow.yaml@main
    with:
      target-directory: './react-app/build'
  print-outputs:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Print outputs
        run: |
          echo "Build status: ${{ needs.deploy.outputs.build-status }}"
          echo "URL: ${{ needs.deploy.outputs.url }}"
